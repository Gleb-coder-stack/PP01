{% extends "base.html" %}

{% block title %}Участники{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-users text-primary"></i> Участники</h2>
        <button class="btn btn-primary" onclick="showAddModal()">
            <i class="fas fa-plus"></i> Добавить участника
        </button>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                        <input type="text" id="searchInput" class="form-control" placeholder="Поиск по фамилии, имени или телефону...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-secondary w-100" onclick="loadParticipants()">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Фамилия</th>
                    <th>Имя</th>
                    <th>Категория</th>
                    <th>Телефон</th>
                    <th>Email</th>
                    <th>Мероприятий</th>
                    <th style="width: 80px">Действия</th>
                </tr>
            </thead>
            <tbody id="participantsTableBody">
                <tr><td colspan="8" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Загрузка...</p>
                </td</details></td>
            </tbody>
        </table>
    </div>
</div>

<!-- Модальное окно -->
<div class="modal fade" id="participantModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus"></i> <span id="modalTitle">Добавить участника</span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="participantForm">
                    <input type="hidden" id="participantId">
                    <div class="mb-3">
                        <label class="form-label">Фамилия *</label>
                        <input type="text" id="participantLastName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Имя *</label>
                        <input type="text" id="participantFirstName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Категория *</label>
                        <select id="participantCategory" class="form-select" required>
                            <option value="ребёнок">Ребёнок</option>
                            <option value="взрослый">Взрослый</option>
                            <option value="волонтёр">Волонтёр</option>
                            <option value="особенный гость">Особенный гость</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" id="participantPhone" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="participantEmail" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveParticipant()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script>
let participantsList = [];

async function loadParticipants() {
    try {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const response = await fetch('/api/participants');
        const result = await response.json();

        if (result.success) {
            participantsList = result.data;
        } else {
            participantsList = [];
        }

        let filtered = [...participantsList];
        if (search) {
            filtered = filtered.filter(p =>
                (p.last_name && p.last_name.toLowerCase().includes(search)) ||
                (p.first_name && p.first_name.toLowerCase().includes(search)) ||
                (p.phone && p.phone.includes(search))
            );
        }

        const tbody = document.getElementById('participantsTableBody');
        tbody.innerHTML = '';

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">Нет участников</td</details></td>';
            return;
        }

        for (const p of filtered) {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = p.id;
            row.insertCell(1).innerHTML = `<strong>${p.last_name || '-'}</strong>`;
            row.insertCell(2).textContent = p.first_name || '-';

            // Цветные бейджи для категорий
            let categoryClass = 'secondary';
            let categoryText = p.category || '-';
            if (p.category === 'ребёнок') {
                categoryClass = 'info';
                categoryText = 'Ребёнок';
            } else if (p.category === 'взрослый') {
                categoryClass = 'primary';
                categoryText = 'Взрослый';
            } else if (p.category === 'волонтёр') {
                categoryClass = 'success';
                categoryText = 'Волонтёр';
            } else if (p.category === 'особенный гость') {
                categoryClass = 'warning';
                categoryText = 'Особенный гость';
            }
            row.insertCell(3).innerHTML = `<span class="badge bg-${categoryClass}">${categoryText}</span>`;

            row.insertCell(4).textContent = p.phone || '-';
            row.insertCell(5).textContent = p.email || '-';
            row.insertCell(6).innerHTML = `<span class="badge bg-secondary rounded-pill">${p.events_count || 0}</span>`;

            const actions = row.insertCell(7);
            actions.innerHTML = `
                <button class="btn btn-sm btn-warning me-1" onclick="editParticipant(${p.id})" title="Редактировать">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteParticipantConfirm(${p.id})" title="Удалить">
                    <i class="fas fa-trash"></i>
                </button>
            `;
        }
    } catch (error) {
        console.error('Ошибка загрузки:', error);
    }
}

async function editParticipant(id) {
    try {
        const response = await fetch(`/api/participants/${id}`);
        const result = await response.json();

        if (result.success && result.data) {
            const p = result.data;
            document.getElementById('modalTitle').textContent = 'Редактировать участника';
            document.getElementById('participantId').value = p.id;
            document.getElementById('participantLastName').value = p.last_name || '';
            document.getElementById('participantFirstName').value = p.first_name || '';
            document.getElementById('participantCategory').value = p.category || 'взрослый';
            document.getElementById('participantPhone').value = p.phone || '';
            document.getElementById('participantEmail').value = p.email || '';

            const modal = new bootstrap.Modal(document.getElementById('participantModal'));
            modal.show();
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка загрузки данных');
    }
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Добавить участника';
    document.getElementById('participantForm').reset();
    document.getElementById('participantId').value = '';
    const modal = new bootstrap.Modal(document.getElementById('participantModal'));
    modal.show();
}

async function saveParticipant() {
    const data = {
        last_name: document.getElementById('participantLastName').value,
        first_name: document.getElementById('participantFirstName').value,
        category: document.getElementById('participantCategory').value,
        phone: document.getElementById('participantPhone').value,
        email: document.getElementById('participantEmail').value
    };

    if (!data.last_name || !data.first_name) {
        alert('Заполните обязательные поля');
        return;
    }

    const id = document.getElementById('participantId').value;
    let url = '/api/participants';
    let method = 'POST';

    if (id) {
        url = `/api/participants/${id}`;
        method = 'PUT';
    }

    try {
        const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();

        if (result.success) {
            bootstrap.Modal.getInstance(document.getElementById('participantModal')).hide();
            loadParticipants();
            alert('Успешно сохранено');
        } else {
            alert('Ошибка: ' + (result.error || 'Неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка сохранения');
    }
}

async function deleteParticipantConfirm(id) {
    if (confirm('Вы уверены? Все записи участника будут удалены.')) {
        try {
            const response = await fetch(`/api/participants/${id}`, { method: 'DELETE' });
            const result = await response.json();
            if (result.success) {
                loadParticipants();
                alert('Участник удалён');
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
}

loadParticipants();

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadParticipants, 300);
});
</script>
{% endblock %}
